<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Panel - Pop Cat Remake</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background-color: #2d2d2d;
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }
        h2, h3 {
            text-align: center;
            margin-top: 0;
        }
        h2 { color: #e74c3c; border-bottom: 2px solid #444; padding-bottom: 10px; }
        h3 { color: #3498db; margin-bottom: 20px; }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #bbb;
        }
        input[type="text"], input[type="number"], input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 6px;
            background-color: #1e1e1e;
            color: #fff;
            box-sizing: border-box;
            font-size: 15px;
        }
        input:focus {
            outline: none;
            border-color: #3498db;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 5px;
        }
        .btn-blue { background-color: #3498db; color: white; }
        .btn-blue:hover { background-color: #2980b9; }
        .btn-red { background-color: #c0392b; color: white; }
        .btn-red:hover { background-color: #a93226; }
        .btn-green { background-color: #27ae60; color: white; }
        .btn-green:hover { background-color: #219653; }
        .btn-critical { background-color: #e74c3c; color: white; padding: 15px; font-size: 16px; border: 2px dashed #fff; }
        .btn-critical:hover { background-color: #c0392b; }
        
        .section-box {
            background-color: #222;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        .section-title {
            margin: 0 0 10px 0;
            font-size: 15px;
            font-weight: bold;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
        }
        .logout-btn {
            background-color: #555;
            color: #fff;
            margin-top: 20px;
        }
        .logout-btn:hover { background-color: #444; }
    </style>
</head>
<body>

    <!-- 1. GERBANG LOGIN ADMIN -->
    <div id="admin-login-box" class="container">
        <h3>🔐 Owner Verification</h3>
        <div class="form-group">
            <label>Username Admin</label>
            <input id="admin-user" type="text" placeholder="Masukkan nama owner...">
        </div>
        <div class="form-group">
            <label>Password Admin</label>
            <input id="admin-pass" type="password" placeholder="Masukkan password...">
        </div>
        <button onclick="loginAdmin()" class="btn-blue">Verifikasi Hak Akses</button>
    </div>

    <!-- 2. DASHBOARD CONTROL PANEL (TERSEMBUNYI SEBELUM LOGIN) -->
    <div id="admin-dashboard" class="container" style="display: none;">
        <h2>⚙️ CONTROL PANEL OWNER</h2>
        <p style="text-align: center; color: #2ecc71; font-size: 14px; margin-top: -5px;">Logged in as Server Administrator</p>

        <!-- Fitur 1: Atur Skor Individu -->
        <div class="section-box">
            <div class="section-title" style="color: #3498db;">🎯 Atur Poin Player</div>
            <div class="form-group">
                <input id="target-user" type="text" placeholder="Username Player">
            </div>
            <div class="form-group">
                <input id="target-score" type="number" placeholder="Set Skor Baru (Misal: 0)">
            </div>
            <button onclick="executeSingleReset()" class="btn-blue">Eksekusi Skor Baru</button>
        </div>

        <!-- Fitur 2: Banned Player + Reason -->
        <div class="section-box">
            <div class="section-title" style="color: #e74c3c;">🔨 Banned System</div>
            <div class="form-group">
                <input id="ban-user" type="text" placeholder="Username Target">
            </div>
            <div class="form-group">
                <input id="ban-reason" type="text" placeholder="Alasan Banned (Reason)">
            </div>
            <button onclick="executeBanPlayer()" class="btn-red">Banned Akun & Sesi</button>
        </div>

        <!-- Fitur 3: Unbanned Player -->
        <div class="section-box">
            <div class="section-title" style="color: #27ae60;">✅ Unbanned System</div>
            <div class="form-group">
                <input id="unban-user" type="text" placeholder="Username Player">
            </div>
            <button onclick="executeUnbanPlayer()" class="btn-green">Lepas Status Banned</button>
        </div>

        <!-- Fitur 4: Reset Season Massal -->
        <div class="section-box" style="border: 1px solid #e74c3c; background-color: #3a1c1c;">
            <div class="section-title" style="color: #e74c3c;">🔄 Reset Global (Reset Season)</div>
            <p style="margin: 0 0 10px 0; font-size: 12px; color: #eaa;">⚠️ Semua skor & koin seluruh player di server Singapura akan otomatis hangus kembali ke 0.</p>
            <button onclick="executeSeasonReset()" class="btn-critical">🔥 RESET SEMUA PLAYER (NEW SEASON)</button>
        </div>

        <button onclick="logoutAdmin()" class="logout-btn">Keluar Panel</button>
    </div>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, set, get, onValue, remove, update } from "firebase/database";

        // Konfigurasi Akun Firebase Milik Aliansyah
        const firebaseConfig = {
          apiKey: "AIzaSyBeR6NWjwcck52gcARSlVcvP_Sd1YwFUWQ",
          authDomain: "soaljancok.firebaseapp.com",
          databaseURL: "https://soaljancok-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "soaljancok",
          storageBucket: "soaljancok.firebasestorage.app",
          messagingSenderId: "358347913427",
          appId: "1:358347913427:web:673ae3148518c2d1effc26",
          measurementId: "G-EHFDWFTWH4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Binding fungsi ke global window
        window.loginAdmin = loginAdmin;
        window.logoutAdmin = logoutAdmin;
        window.executeSingleReset = executeSingleReset;
        window.executeSeasonReset = executeSeasonReset;
        window.executeBanPlayer = executeBanPlayer;
        window.executeUnbanPlayer = executeUnbanPlayer;

        // USERNAME ADMIN UTAMA (Harus sesuai dengan akun data game milikmu)
        const ADMIN_USERNAME = "Aliansyah"; 
        let allUsersData = {};

        // Ambil data database secara realtime saat panel terbuka
        onValue(ref(db, 'users'), (snapshot) => {
            allUsersData = snapshot.val() || {};
        });

        // 1. Fungsi Login Validasi Admin Server
        function loginAdmin() {
            const user = document.getElementById('admin-user').value.trim();
            const pass = document.getElementById('admin-pass').value.trim();

            if(user !== ADMIN_USERNAME) {
                alert("Akses Ditolak! Anda bukan owner resmi game ini.");
                return;
            }

            // Validasi password ke node database akun Aliansyah
            get(ref(db, 'users/' + ADMIN_USERNAME)).then((snapshot) => {
                if(snapshot.exists() && snapshot.val().password === pass) {
                    document.getElementById('admin-login-box').style.display = 'none';
                    document.getElementById('admin-dashboard').style.display = 'block';
                    alert("🔓 Selamat Datang Owner! Sistem Kontrol Berhasil Dibuka.");
                } else {
                    alert("Password Salah! Verifikasi gagal.");
                }
            }).catch(e => alert("Error Database: " + e.message));
        }

        // 2. Atur / Reset Skor Player Tertentu
        function executeSingleReset() {
            const userTarget = document.getElementById('target-user').value.trim();
            const scoreTarget = parseInt(document.getElementById('target-score').value.trim());

            if (!userTarget || isNaN(scoreTarget)) { alert("Harap isi username dan nilai skor baru!"); return; }
            if (!allUsersData[userTarget]) { alert("Player tidak ditemukan di database!"); return; }

            set(ref(db, `users/${userTarget}/highestScore`), scoreTarget).then(() => {
                alert(`Berhasil merubah skor [${userTarget}] menjadi ${scoreTarget} Pop!`);
                document.getElementById('target-user').value = "";
                document.getElementById('target-score').value = "";
            }).catch(e => alert("Gagal: " + e.message));
        }

        // 3. Banned Player Dengan Alasan
        function executeBanPlayer() {
            const banTarget = document.getElementById('ban-user').value.trim();
            const reasonText = document.getElementById('ban-reason').value.trim() || "Melanggar peraturan komunitas game.";

            if (!banTarget) { alert("Masukkan username player yang ingin dibanned!"); return; }
            if (banTarget === ADMIN_USERNAME) { alert("Sistem Error: Anda tidak bisa membanned diri sendiri!"); return; }

            set(ref(db, 'banned_users/' + banTarget), {
                reason: reasonText,
                bannedAt: new Date().toISOString()
            }).then(() => {
                alert(`🔨 Akun [${banTarget}] Berhasil Di-banned Permanen!\nAlasan: ${reasonText}`);
                document.getElementById('ban-user').value = "";
                document.getElementById('ban-reason').value = "";
            }).catch(e => alert("Gagal membanned: " + e.message));
        }

        // 4. Memaafkan / Unbanned Player
        function executeUnbanPlayer() {
            const unbanTarget = document.getElementById('unban-user').value.trim();
            if (!unbanTarget) { alert("Masukkan nama player!"); return; }

            remove(ref(db, 'banned_users/' + unbanTarget)).then(() => {
                alert(`✅ Blokir sukses dilepas! Akun [${unbanTarget}] sudah bisa login kembali.`);
                document.getElementById('unban-user').value = "";
            }).catch(e => alert("Gagal unban: " + e.message));
        }

        // 5. Reset Season Massal Global
        function executeSeasonReset() {
            if (!confirm("🚨 PERINGATAN KERAS!\nApakah kamu benar-benar ingin mereset TOTAL skor dan koin semua player di server menjadi 0? Tindakan ini tidak bisa dibatalkan.")) return;

            let updates = {};
            for (let name in allUsersData) {
                updates[`/users/${name}/highestScore`] = 0;
                updates[`/users/${name}/coins`] = 0;
            }

            update(ref(db), updates).then(() => {
                alert("🎉 RESET SEASON BERHASIL! Seluruh isi leaderboard server kembali bersih dari awal.");
            }).catch(e => alert("Gagal Reset Season: " + e.message));
        }

        function logoutAdmin() {
            document.getElementById('admin-dashboard').style.display = 'none';
            document.getElementById('admin-login-box').style.display = 'block';
            document.getElementById('admin-user').value = "";
            document.getElementById('admin-pass').value = "";
        }
    </script>
</body>
</html>
